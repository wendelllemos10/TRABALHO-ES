<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alagamentos em Quixadá</title>
    
    <!-- CSS do Leaflet (Biblioteca do Mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- CSS para estilizar a tela -->
    <link rel="stylesheet" href="style.css">
</head>
<body onload="carregarMarcadoresDoBanco()">

    <h1>Alagamentos em Quixadá</h1>
    
    <div id="map"></div>

    <div id="container-formulario">
        <h3>Reportar Ponto de Alagamento</h3>
            <form id="form-alagamento">
                <label for="rua">Nome da Rua/Referência:</label>
                <input type="text" id="rua" required placeholder="Ex: Rua Clarindo de Queiroz" autocomplete="off">
                
                <ul id="lista-sugestoes" class="sugestoes-oculta"></ul>
            
                <label for="descricao">Descrição do Problema:</label>
                <textarea id="descricao" required placeholder="Ex: Água na altura do joelho, intransitável."></textarea>
            
                <input type="hidden" id="latitude">
                <input type="hidden" id="longitude">
            
                <button type="submit">Enviar Alerta</button>
            </form>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
